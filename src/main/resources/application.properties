spring.application.name=ticketmanagement

# H2 dosya tabanli veritabani
# Veriler ./data/ticketdb.mv.db dosyasinda kalici tutulur.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/ticketdb;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# JWT ayarlari
jwt.secret=${JWT_SECRET:ticketmanagement-demo-secret-local-development-only-change-in-production-2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

# HTTP yanitlari UTF-8 olarak dondurulur.
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
